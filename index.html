<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>scam</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
text-align:center;
}

h1{
font-size:36px;
margin-bottom:20px;
}

.inputBox{
background:#111;
padding:20px;
border-radius:20px;
border:3px solid #00ffff;
box-shadow:0 0 20px #00ffff;
}

input{
font-size:32px;
padding:15px;
width:160px;
text-align:center;
border-radius:10px;
border:none;
outline:none;
}

.num{
position:absolute;
font-size:40px;
font-weight:bold;
animation: fly 3s linear forwards;
}

@keyframes fly{
0%{transform:scale(0);opacity:1;}
50%{transform:scale(2);}
100%{transform:translate(var(--x),var(--y)) scale(0.5);opacity:0;}
}

.shake{
animation: shake 0.3s infinite;
}

@keyframes shake{
0%{transform:translate(0,0)}
25%{transform:translate(-6px,6px)}
50%{transform:translate(6px,-6px)}
75%{transform:translate(-6px,-6px)}
100%{transform:translate(0,0)}
}
</style>
</head>

<body>

<h1>45 + 22 = ?</h1>

<div class="inputBox">
<input id="box" placeholder="?">
</div>

<script>

let started=false

let colors=[
"#ff0000","#00ff00","#00ffff","#ff00ff",
"#ffff00","#ff8800","#00aaff","#ff66cc",
"#66ff66","#ffffff"
]

document.getElementById("box").addEventListener("input",function(){

if(this.value==="67" && !started){

started=true

document.body.classList.add("shake")

setInterval(()=>{

if(navigator.vibrate){
navigator.vibrate(150)
}

for(let i=0;i<20;i++){

let n=document.createElement("div")
n.className="num"
n.innerText="67"

n.style.color=colors[Math.floor(Math.random()*colors.length)]

n.style.left=Math.random()*window.innerWidth+"px"
n.style.top=Math.random()*window.innerHeight+"px"

n.style.setProperty("--x",(Math.random()*800-400)+"px")
n.style.setProperty("--y",(Math.random()*800-400)+"px")

document.body.appendChild(n)

setTimeout(()=>n.remove(),3000)

}

},250)

}

})

</script>

</body>
</html>
